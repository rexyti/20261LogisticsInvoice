# Datasource (LocalStack / Docker local)
spring.datasource.url=jdbc:postgresql://localhost:5432/logistica_dev
spring.datasource.username=logistica
spring.datasource.password=logistica

# JPA — DDL solo en dev
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

# Logging
logging.level.com.logistica=DEBUG
logging.level.org.springframework.security=DEBUG
