# Database
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/logistica}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.flyway.enabled=true

# Jackson
spring.jackson.property-naming-strategy=SNAKE_CASE
spring.jackson.serialization.write-dates-as-timestamps=false

# AWS SQS
spring.cloud.aws.region.static=${AWS_REGION:us-east-1}
spring.cloud.aws.credentials.access-key=${AWS_ACCESS_KEY:test}
spring.cloud.aws.credentials.secret-key=${AWS_SECRET_KEY:test}

# Queue names
app.sqs.queue.ruta-cerrada=${QUEUE_RUTA_CERRADA:ruta-cerrada-queue}

# Logging
logging.level.com.logistica=INFO
