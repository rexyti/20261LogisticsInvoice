spring:
  application:
    name: logistica-financiero

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/logistica_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

# URL base del Módulo de Gestión de Paquetes — nunca hardcodeada (T002)
package-api:
  base-url: ${PACKAGE_API_URL:http://localhost:8081}

# Configuración Resilience4j (T003)
# Orden de decoración: CircuitBreaker -> Retry -> TimeLimiter (crítico, no invertir)
resilience4j:
  circuitbreaker:
    circuit-breaker-aspect-order: 1
    instances:
      packageApi:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        ignore-exceptions:
          - com.logistica.shared.exceptions.PaqueteNoEncontradoException

  retry:
    retry-aspect-order: 2
    instances:
      packageApi:
        max-attempts: 3
        wait-duration: 500ms
        ignore-exceptions:
          - com.logistica.shared.exceptions.PaqueteNoEncontradoException

  timelimiter:
    time-limiter-aspect-order: 3
    instances:
      packageApi:
        timeout-duration: 2s
        cancel-running-future: true

logging:
  level:
    com.logistica: INFO
    feign: DEBUG
