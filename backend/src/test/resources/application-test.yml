spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
    open-in-view: false

  flyway:
    enabled: false

package:
  api:
    url: http://localhost:8089

resilience4j:
  timelimiter:
    instances:
      packageApi:
        timeout-duration: 2s
        cancel-running-future: true
  retry:
    instances:
      packageApi:
        max-attempts: 3
        wait-duration: 100ms
        retry-exceptions:
          - java.util.concurrent.TimeoutException
          - java.io.IOException
  circuitbreaker:
    instances:
      packageApi:
        sliding-window-size: 5
        failure-rate-threshold: 50
