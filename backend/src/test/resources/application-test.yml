spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

package-api:
  base-url: http://localhost:${wiremock.server.port:8089}

resilience4j:
  circuitbreaker:
    instances:
      packageApi:
        sliding-window-size: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 5s
        ignore-exceptions:
          - com.logistica.shared.exceptions.PaqueteNoEncontradoException

  retry:
    instances:
      packageApi:
        max-attempts: 3
        wait-duration: 100ms
        ignore-exceptions:
          - com.logistica.shared.exceptions.PaqueteNoEncontradoException

  timelimiter:
    instances:
      packageApi:
        timeout-duration: 2s
        cancel-running-future: true
