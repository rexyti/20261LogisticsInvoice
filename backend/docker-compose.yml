services:
  app:
    build: .
    container_name: longistica-app
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/logistica
      - SPRING_DATASOURCE_USERNAME=luis
      - SPRING_DATASOURCE_PASSWORD=123456789
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - PACKAGE_API_URL=http:://localhost:9090
      - APP_CORS_ALLOWED_ORIGINS=http://localhost:3000,http://localhost:5173
    networks:
      - logistica-network

  db:
    image: postgres:15
    container_name: postgres-db
    environment:
      POSTGRES_DB: logistica
      POSTGRES_USER: luis
      POSTGRES_PASSWORD: 123456789
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U luis -d logistica"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - logistica-network

networks:
  logistica-network:
    driver: bridge